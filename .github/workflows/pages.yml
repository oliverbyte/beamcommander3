name: Deploy homepage to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "docs/screenshots/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Screenshots live in docs/screenshots (auto-updated by the release
      # workflow) rather than being duplicated inside website/, so they
      # can't go stale here - just copy the current ones into the site
      # at build time.
      - name: Stage site
        run: |
          rm -rf /tmp/site
          cp -r website /tmp/site
          mkdir -p /tmp/site/img
          cp docs/screenshots/*.png /tmp/site/img/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
