name: Release (macOS)

# Builds a standalone macOS package (laser_daemon + the built frontend,
# served statically by the daemon itself - see DEVELOPER.md's "Standalone /
# packaged builds" section) and publishes it as a GitHub Release whenever
# something is pushed to main.
#
# Runner: macos-14 is Apple Silicon (arm64). If you need an Intel build too,
# add another job with `runs-on: macos-13` and repeat the same steps under a
# different artifact/asset name - kept to one architecture for now to keep
# this workflow simple.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-macos
  cancel-in-progress: false

env:
  LIBERA_DIR: /tmp/libera-laser

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install build prerequisites
        run: brew install cmake ninja libusb pkg-config

      - name: Resolve libera-laser commit SHA (for cache key)
        id: libera-sha
        run: |
          sha="$(git ls-remote https://github.com/sebleedelisle/libera-laser.git HEAD | cut -f1)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache libera-laser build
        id: libera-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBERA_DIR }}
          key: libera-laser-macos-14-${{ steps.libera-sha.outputs.sha }}

      - name: Build libera-laser
        if: steps.libera-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf "$LIBERA_DIR"
          git clone --depth=1 https://github.com/sebleedelisle/libera-laser.git "$LIBERA_DIR"
          cd "$LIBERA_DIR"
          git submodule update --init --recursive
          cmake --preset release \
            -DLIBERA_BUILD_EXAMPLES=OFF \
            -DLIBERA_BUILD_TESTS=OFF \
            -DLIBERA_BUILD_LASER_TOOL=OFF
          cmake --build --preset release

      - name: Build backend (laser_daemon)
        run: cd backend && bash build.sh

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Assemble release package (.app + .dmg)
        id: package
        run: |
          version="v$(date -u +%Y.%m.%d)-${GITHUB_RUN_NUMBER}"
          name="beamcommander3-macos-arm64-${version}"
          app="/tmp/BeamCommander3.app"
          rm -rf "$app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Frameworks" "$app/Contents/Resources"

          sed "s/__VERSION__/${version}/g" packaging/Info.plist.template > "$app/Contents/Info.plist"
          cp packaging/launcher.sh "$app/Contents/MacOS/BeamCommander3"
          cp backend/laser_daemon "$app/Contents/MacOS/laser_daemon"
          cp backend/midi_map.json "$app/Contents/Resources/"
          cp -r frontend/dist "$app/Contents/Resources/frontend_dist"
          chmod +x "$app/Contents/MacOS/BeamCommander3" "$app/Contents/MacOS/laser_daemon"

          # laser_daemon dynamically links Homebrew's libusb, which only
          # exists on the runner (e.g. /opt/homebrew/opt/libusb/...) - bundle
          # the dylib into Contents/Frameworks (standard app-bundle layout)
          # and repoint the load command at it via @executable_path, so the
          # release doesn't require Homebrew or libusb pre-installed.
          libusb_path="$(otool -L "$app/Contents/MacOS/laser_daemon" | awk '/libusb.*\.dylib/{print $1; exit}')"
          if [[ -n "$libusb_path" ]]; then
            cp "$libusb_path" "$app/Contents/Frameworks/libusb-1.0.0.dylib"
            chmod 644 "$app/Contents/Frameworks/libusb-1.0.0.dylib"
            install_name_tool -change "$libusb_path" "@executable_path/../Frameworks/libusb-1.0.0.dylib" "$app/Contents/MacOS/laser_daemon"
          fi

          # Ad-hoc sign the whole bundle (recursively - covers the bundled
          # dylib and laser_daemon too). Re-signing the copied dylib is what
          # actually matters here: Homebrew's original signature doesn't
          # survive being re-hosted inside our (differently-identified) app
          # bundle once quarantined after download, which macOS's library
          # validation policy then refuses to load ("library load disallowed
          # by system policy") unless every nested binary is re-signed
          # consistently with the app itself.
          codesign --deep --force -s - "$app"
          codesign --verify --deep --strict "$app"

          # Package as a .dmg with a drag-to-Applications shortcut, like a
          # normal downloadable Mac app - not just a bare zip of files.
          dmg_stage="/tmp/dmg-stage"
          rm -rf "$dmg_stage"; mkdir -p "$dmg_stage"
          cp -r "$app" "$dmg_stage/"
          ln -s /Applications "$dmg_stage/Applications"
          dmg_path="/tmp/${name}.dmg"
          hdiutil create -volname "BeamCommander3" -srcfolder "$dmg_stage" -ov -format UDZO "$dmg_path"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.version }}
          name: ${{ steps.package.outputs.version }}
          body: |
            Automated macOS (Apple Silicon) build from `${{ github.sha }}`.

            Download the .dmg, drag **BeamCommander3** into **Applications**,
            then open it from there - it starts the backend and opens
            http://localhost:8000 in your browser automatically. No Node.js
            or Xcode required at runtime - the frontend is bundled and served
            by the app itself.

            This build isn't notarized (no Apple Developer ID), so on first
            launch macOS will refuse to open it as "from an unidentified
            developer" - right-click the app in Applications and choose
            **Open** once to approve it (only needed the first time).
          files: ${{ steps.package.outputs.dmg_path }}
